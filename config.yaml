# filmTransfer 配置文件

# ============================================
# MySQL 数据库配置
# ============================================
database:
  host: "localhost"
  port: 3307
  user: "root"
  password: "Mysql123!"
  database: "film_transfer"
  pool_size: 20
  max_overflow: 40

# ============================================
# API 服务器配置
# ============================================
api:
  enabled: true
  host: "0.0.0.0"
  port: 5000
  debug: true
  jwt_secret: "your-secret-key-change-this-in-production"
  jwt_access_token_expires: 3600
  jwt_refresh_token_expires: 604800

# ============================================
# 应用配置
# ============================================

# 运行模式:
#   - auto: 全自动模式，自动搜索并转存到夸克网盘（默认）
#   - semi-auto: 半自动模式，搜索结果保存到 Excel 文件，手动处理
mode: "auto"

# Stremio 插件配置 (可添加多个)
stremio_addons:
  - name: "Streaming Catalogs"
    manifest_url: "https://7a82163c306e-stremio-netflix-catalog-addon.baby-beamup.club/bmZ4LGRucCxhbXAsYXRwLGhibTo6SEs6MTc3MTgzNjQ3NDg3NzowOjA6SEs%3D/manifest.json"
    enabled: true
    # 此 addon 包含 Netflix, Disney+, Prime Video, HBO Max 等内容
    # 只监控指定类型，留空则全部监控
    watch_types: ["movie", "series"]
    # 只监控指定 catalog id，留空则全部监控
    watch_catalogs: []

  - name: "Netflix Catalog"
    manifest_url: "https://7a82163c306e-stremio-netflix-catalog-addon.baby-beamup.club/bmZ4LGRucCxhbXAsYXRwLGhibTo6SEs6MTc3MTgzNjQ3NDg3NzowOjA6SEs%3D/manifest.json"
    enabled: false
    # 只监控指定类型，留空则全部监控
    watch_types: ["movie", "series"]
    # 只监控指定 catalog id，留空则全部监控
    watch_catalogs: []

# 检查间隔（分钟）
check_interval_minutes: 60

